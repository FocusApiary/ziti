# Base Helm values for openziti/ziti-router (chart v2.x).
# Overlay-specific settings (hosts, ctrl endpoint, images) live in overlays/<cluster>/values.yaml.

edge:
  advertisedPort: 443
  service:
    enabled: true
    type: ClusterIP
  ingress:
    enabled: false

linkListeners:
  transport:
    advertisedPort: 443
    service:
      enabled: true
      type: ClusterIP
    ingress:
      enabled: false

persistence:
  enabled: true
  size: 1Gi
  accessMode: ReadWriteOnce

# ziggy user = uid/gid 2171.
podSecurityContext:
  fsGroup: 2171
  runAsUser: 2171
  runAsGroup: 2171
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Resource requests/limits — satisfies Kyverno audit-require-container-resources policy.
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
