# Buck-lab router overrides.

ctrl:
  endpoint: ziti-controller-ctrl.ziti.svc:443
  # Prefer in-cluster controller endpoint for router control channel.
  # Enrollment tokens currently advertise public hostnames that are not
  # consistently reachable from this namespace during bootstrap.
  endpointsFile: ""

edge:
  advertisedHost: ziti-router.focuspass.com

linkListeners:
  transport:
    advertisedHost: ziti-router.focuspass.com

persistence:
  storageClass: longhorn-r2

image:
  repository: harbor.focuscell.org/openziti/ziti-router
  tag: "1.7.2"

nodeSelector:
  om-labs.io/storage-node: "true"

imagePullSecrets:
  - name: harbor-pull-secret

# Enrollment JWT is sourced from AKV via ESO.
enrollmentJwtFromSecret: true
enrollmentJwtSecretName: ziti-router-buck-lab-router-01-jwt

# Chart defaults ZITI_ROUTER_NAME to release name ("ziti-router"), but the
# existing edge-router identity is "buck-lab-router-01". Override to keep
# enrollment JWT and router identity aligned.
env:
  ZITI_ROUTER_NAME: buck-lab-router-01
