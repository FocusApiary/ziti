# Buck-lab controller overrides.

clientApi:
  advertisedHost: ziti.focuspass.com
  # Alt hostname for browser-based OIDC enrollment. Go's crypto/tls selects
  # certs by SNI — the LE alt cert only has enroll.focuspass.com as SAN, so
  # browsers hitting this hostname get the trusted LE cert automatically.
  altDnsNames:
    - enroll.focuspass.com
  # OIDC redirect URIs for the main listener (port 1280). The upstream chart
  # hardcodes edge-oidc options: {} — our patched chart template exposes this
  # value. iOS ZDE requires ziti://callback which is not in the defaults.
  oidcOptions:
    redirectURIs:
      - "openziti://auth/callback"
      - "ziti://callback"
      - "https://127.0.0.1:*/auth/callback"
      - "http://127.0.0.1:*/auth/callback"
      - "https://localhost:*/auth/callback"
      - "http://localhost:*/auth/callback"

ctrlPlane:
  advertisedHost: ziti.focuspass.com

persistence:
  storageClass: longhorn-r2
  labels:
    recurring-job-group.longhorn.io/critical: enabled

image:
  repository: harbor.focuscell.org/infra/ziti-controller
  tag: "2.0.0-pre2-patched"

# Keep controller on storage nodes (persistent BoltDB).
nodeSelector:
  om-labs.io/storage-node: "true"

imagePullSecrets:
  - name: harbor-pull-secret

# Controller admin credentials are sourced from AKV via ESO.
useCustomAdminSecret: true
customAdminSecretName: ziti-controller-admin-secret

# LE alt cert for browser-based OIDC enrollment on enroll.focuspass.com.
# Go's crypto/tls selects certs by SNI: the PKI cert only matches
# ziti.focuspass.com, the LE cert only matches enroll.focuspass.com.
# Tunnelers use ziti.focuspass.com → PKI cert (pinned in identity JSON).
# Browsers use enroll.focuspass.com → LE cert (OS-trusted for OIDC flow).
#
# NOTE: Envoy Gateway uses TLS Passthrough for both hostnames.
# No HTTPS Terminate / BackendTLSPolicy needed.
webBindingPki:
  altServerCerts:
    - mode: certManager
      secretName: ziti-controller-le-server-cert
      altDnsNames:
        - enroll.focuspass.com
      issuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: letsencrypt-prod
      mountPath: /etc/ziti/alt-server-cert

# Second xweb listener for enroll.focuspass.com (LE cert, port 1281).
# Provides a separate OIDC endpoint with an OS-trusted LE certificate for
# browser-based enrollment. The main listener (port 1280) now also has the
# correct redirect URIs via our patched chart template (clientApi.oidcOptions).
#
# NOTE: xweb v3.0.3 panics when two listeners share the SAME port
# ("handler for protocol[h2] already exists"). Port 1281 is safe.
additionalConfigs:
  web:
    - name: oidc-enrollment
      bindPoints:
        - interface: 0.0.0.0:1281
          address: enroll.focuspass.com:443
      identity:
        cert:        /etc/ziti/web-client-identity/tls.crt
        key:         /etc/ziti/web-client-identity/tls.key
        server_cert: /etc/ziti/web-identity/tls.crt
        server_key:  /etc/ziti/web-identity/tls.key
        ca:          /etc/ziti/web-identity/ca.crt
        alt_server_certs:
          - server_cert: "/etc/ziti/alt-server-cert/tls.crt"
            server_key:  "/etc/ziti/alt-server-cert/tls.key"
      options:
        idleTimeout: 5000ms
        readTimeout: 5000ms
        writeTimeout: 100000ms
        minTLSVersion: TLS1.2
        maxTLSVersion: TLS1.3
      apis:
        - binding: edge-client
          options: {}
        - binding: edge-oidc
          options:
            redirectURIs:
              - "openziti://auth/callback"
              - "ziti://callback"
              - "https://127.0.0.1:*/auth/callback"
              - "http://127.0.0.1:*/auth/callback"
              - "https://localhost:*/auth/callback"
              - "http://localhost:*/auth/callback"
