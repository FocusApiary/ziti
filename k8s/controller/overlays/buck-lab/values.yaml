# Buck-lab controller overrides.

clientApi:
  advertisedHost: ziti.focuspass.com

ctrlPlane:
  advertisedHost: ziti.focuspass.com

persistence:
  storageClass: longhorn-r2

image:
  repository: harbor.focuscell.org/infra/ziti-controller
  tag: "2.0.0-pre2-patched"

# Keep controller on storage nodes (persistent BoltDB).
nodeSelector:
  om-labs.io/storage-node: "true"

imagePullSecrets:
  - name: harbor-pull-secret

# Controller admin credentials are sourced from AKV via ESO.
useCustomAdminSecret: true
customAdminSecretName: ziti-controller-admin-secret

# NOTE: External LE TLS is terminated by Envoy Gateway, not the controller.
# The RSA LE cert (ziti-controller-le-server-cert) is referenced by the
# Gateway HTTPS listener via ReferenceGrant. The controller serves only
# internal PKI on port 1280 — no additionalConfigs or altServerCerts needed.
# Controller xweb v3.0.3 panics on additionalConfigs.web (nil Identity in
# NewServer), so Envoy TLS termination is the correct enterprise pattern.
