# Buck-lab controller overrides.

clientApi:
  advertisedHost: ziti.focuspass.com
  # LE alt cert for browser-based OIDC enrollment. Go's crypto/tls selects the
  # best-matching cert per ClientHello (RSA LE for browsers, ECDSA PKI for
  # tunnelers). Tunneler clients work regardless — they use the PKI cert.
  # If LE is rate-limited, cert-manager will retry automatically.
  altServerCerts:
    - mode: certManager
      secretName: ziti-controller-le-server-cert
      issuerRef:
        group: cert-manager.io
        kind: ClusterIssuer
        name: letsencrypt-prod
      mountPath: /etc/ziti/alt-server-cert

ctrlPlane:
  advertisedHost: ziti.focuspass.com

persistence:
  storageClass: longhorn-r2
  labels:
    recurring-job-group.longhorn.io/critical: enabled

image:
  repository: harbor.focuscell.org/infra/ziti-controller
  tag: "2.0.0-pre2-patched"

# Keep controller on storage nodes (persistent BoltDB).
nodeSelector:
  om-labs.io/storage-node: "true"

imagePullSecrets:
  - name: harbor-pull-secret

# Controller admin credentials are sourced from AKV via ESO.
useCustomAdminSecret: true
customAdminSecretName: ziti-controller-admin-secret

# NOTE: Envoy Gateway uses TLS Passthrough for Ziti — the controller serves
# its own PKI cert AND the LE alt cert. No HTTPS Terminate, no
# BackendTLSPolicy, no ReferenceGrant needed.
