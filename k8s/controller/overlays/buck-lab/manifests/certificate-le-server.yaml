# RSA Let's Encrypt certificate for external tunneler clients.
# Managed outside the Helm chart because the chart's altServerCerts template
# hardcodes ECDSA and doesn't expose privateKey configuration.
# ZDE (Ziti Desktop Edge) for Windows requires RSA server certs.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ziti-controller-le-server-cert
  namespace: ziti
spec:
  secretName: ziti-controller-le-server-cert
  privateKey:
    algorithm: RSA
    size: 2048
  dnsNames:
    - ziti.focuspass.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-prod
  usages:
    - digital signature
    - key encipherment
    - server auth
