apiVersion: v1
kind: ConfigMap
metadata:
  name: ziti-ops-automation-scripts
  namespace: ziti
data:
  db-maintenance.sh: |
    #!/bin/sh
    set -eu

    action="${1:-snapshot}"
    controller="${ZITI_CONTROLLER_URL:-https://ziti.focuspass.com:443}"

    log_json() {
      printf '{"ts":"%s","component":"ziti-db-maintenance","action":"%s","msg":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$action" "$1"
    }

    attempt=1
    max_attempts=12
    while [ "$attempt" -le "$max_attempts" ]; do
      if ziti edge login "$controller" -u "$ZITI_ADMIN_USER" -p "$ZITI_ADMIN_PASSWORD" -y >/tmp/login.out 2>&1; then
        log_json "login_ok"
        break
      fi
      cat /tmp/login.out || true
      log_json "login_retry_${attempt}"
      attempt=$((attempt+1))
      sleep 10
    done

    if [ "$attempt" -gt "$max_attempts" ]; then
      log_json "login_failed"
      exit 1
    fi

    case "$action" in
      snapshot)
        log_json "snapshot_start"
        ziti edge db snapshot >/tmp/snapshot.out 2>&1 || {
          cat /tmp/snapshot.out
          log_json "snapshot_failed"
          exit 1
        }
        cat /tmp/snapshot.out || true
        log_json "snapshot_done"
        ;;
      integrity)
        log_json "integrity_start"
        ziti edge db start-check-integrity >/tmp/integrity-start.out 2>&1 || {
          cat /tmp/integrity-start.out
          log_json "integrity_start_failed"
          exit 1
        }
        cat /tmp/integrity-start.out || true
        sleep 30
        ziti edge db check-integrity-status >/tmp/integrity-status.out 2>&1 || true
        cat /tmp/integrity-status.out || true
        log_json "integrity_status_logged"
        ;;
      *)
        log_json "unknown_action"
        exit 2
        ;;
    esac
  event-stream.sh: |
    #!/bin/sh
    set -eu

    controller="${ZITI_CONTROLLER_URL:-https://ziti.focuspass.com:443}"

    log_json() {
      printf '{"ts":"%s","component":"ziti-audit-event-stream","msg":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1"
    }

    while true; do
      if ziti edge login "$controller" -u "$ZITI_ADMIN_USER" -p "$ZITI_ADMIN_PASSWORD" --read-only -y >/dev/null 2>&1; then
        log_json "login_ok"
      else
        log_json "login_failed"
        sleep 15
        continue
      fi

      log_json "stream_start"
      if ! ziti fabric stream events \
        --entity-change \
        --api-sessions \
        --sessions \
        --connect \
        --services \
        --routers \
        --usage \
        --usage-version 3 \
        -j; then
        log_json "stream_disconnected"
      fi

      sleep 5
    done
  oidc-reconcile.sh: |
    #!/bin/sh
    set -eu

    controller="${ZITI_MGMT_URL:-https://ziti-controller-client.ziti.svc.cluster.local:443}"
    signer_name="${ZITI_OIDC_SIGNER_NAME:-keycloak-omlabs}"
    auth_policy_name="${ZITI_OIDC_AUTH_POLICY_NAME:-oidc-keycloak}"
    issuer="${ZITI_OIDC_ISSUER:-https://auth.focuspass.com/realms/omlabs}"
    jwks_endpoint="${ZITI_OIDC_JWKS_ENDPOINT:-https://auth.focuspass.com/realms/omlabs/protocol/openid-connect/certs}"
    external_auth_url="${ZITI_OIDC_EXTERNAL_AUTH_URL:-https://auth.focuspass.com/realms/omlabs}"
    client_id="${ZITI_OIDC_CLIENT_ID:-openziti-tunneler}"
    audience="${ZITI_OIDC_AUDIENCE:-openziti}"
    oidc_users="${ZITI_OIDC_USERS:-seanh@focuspass.com|seanh-oidc|member,engineering,infra-admin,openclaw-admin
    sconejos@focuspass.com|sconejos-oidc|member,engineering
    mrh@focuspass.com|mrh-oidc|member,engineering
    abdulrehman@focuspass.com|abdulrehman-oidc|member,engineering
    azlankhan@focuspass.com|azlankhan-oidc|member,engineering
    mahakhan@focuspass.com|mahakhan-oidc|member
    zaryabayub@focuspass.com|zaryabayub-oidc|member,engineering,devops-watcher}"

    log_json() {
      printf '{"ts":"%s","component":"ziti-oidc-reconcile","msg":"%s"}\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1"
    }

    urlencode() {
      jq -nr --arg v "$1" '$v|@uri'
    }

    first_id() {
      jq -r '.data[0].id // ""'
    }

    http_body() {
      sed '$d'
    }

    http_code() {
      tail -n1
    }

    api_request() {
      method="$1"
      path="$2"
      body="${3:-}"

      if [ -n "$body" ]; then
        curl -sk -w '\n%{http_code}' -X "$method" \
          "$controller/edge/management/v1$path" \
          -H "zt-session: $TOKEN" \
          -H 'Content-Type: application/json' \
          -d "$body"
      else
        curl -sk -w '\n%{http_code}' -X "$method" \
          "$controller/edge/management/v1$path" \
          -H "zt-session: $TOKEN" \
          -H 'Content-Type: application/json'
      fi
    }

    api_json() {
      method="$1"
      path="$2"
      body="${3:-}"
      expected="${4:-200}"

      response="$(api_request "$method" "$path" "$body")"
      code="$(printf '%s' "$response" | http_code)"
      payload="$(printf '%s' "$response" | http_body)"

      if [ "$code" != "$expected" ]; then
        log_json "api_error_${method}_${code}_${path}"
        printf '%s\n' "$payload" >&2
        exit 1
      fi

      printf '%s' "$payload"
    }

    build_auth_body() {
      jq -nc --arg username "$ZITI_ADMIN_USER" --arg password "$ZITI_ADMIN_PASSWORD" '{username: $username, password: $password}'
    }

    build_auth_policy_body() {
      signer_id="$1"
      jq -nc \
        --arg name "$auth_policy_name" \
        --arg signer_id "$signer_id" \
        '{
          name: $name,
          primary: {
            cert: {
              allowed: true,
              allowExpiredCerts: false
            },
            extJwt: {
              allowed: true,
              allowedSigners: (if $signer_id == "" then [] else [$signer_id] end)
            },
            updb: {
              allowed: false,
              lockoutDurationMinutes: 0,
              maxAttempts: 0,
              minPasswordLength: 5,
              requireMixedCase: false,
              requireNumberChar: false,
              requireSpecialChar: false
            }
          },
          secondary: {
            requireTotp: false
          },
          tags: {}
        }'
    }

    build_signer_body() {
      enroll_auth_policy_id="${1:-}"
      ENROLL_AUTH_POLICY_ID="$enroll_auth_policy_id" \
      SIGNER_NAME="$signer_name" \
      ISSUER="$issuer" \
      JWKS_ENDPOINT="$jwks_endpoint" \
      EXTERNAL_AUTH_URL="$external_auth_url" \
      CLIENT_ID="$client_id" \
      AUDIENCE="$audience" \
      jq -nc \
        --arg name "$signer_name" \
        --arg issuer "$issuer" \
        --arg jwks "$jwks_endpoint" \
        --arg audience "$audience" \
        --arg client_id "$client_id" \
        --arg external_auth_url "$external_auth_url" \
        --arg enroll_auth_policy_id "$enroll_auth_policy_id" \
        '{
          name: $name,
          issuer: $issuer,
          jwksEndpoint: $jwks,
          audience: $audience,
          clientId: $client_id,
          claimsProperty: "email",
          useExternalId: true,
          enabled: true,
          externalAuthUrl: $external_auth_url,
          scopes: ["openid", "profile", "email", "offline_access"],
          targetToken: "ACCESS",
          enrollToCertEnabled: true,
          enrollToTokenEnabled: true,
          enrollNameClaimsSelector: "/email",
          enrollAttributeClaimsSelector: "/realm_roles",
          tags: {}
        } + (if $enroll_auth_policy_id == "" then {} else {enrollAuthPolicyId: $enroll_auth_policy_id} end)'
    }

    build_identity_body() {
      email="$1"
      name="$2"
      attrs="$3"
      jq -nc \
        --arg name "$name" \
        --arg email "$email" \
        --arg auth_policy_id "$auth_policy_id" \
        --arg attrs "$attrs" \
        '{
          name: $name,
          type: "Default",
          isAdmin: false,
          authPolicyId: $auth_policy_id,
          externalId: $email,
          roleAttributes: ($attrs | split(",") | map(select(length > 0))),
          tags: {}
        }'
    }

    log_json "auth_start"
    auth_response="$(curl -sk -X POST "$controller/edge/management/v1/authenticate?method=password" \
      -H 'Content-Type: application/json' \
      -d "$(build_auth_body)")"
    TOKEN="$(printf '%s' "$auth_response" | jq -r '.data.token // ""')"

    if [ -z "$TOKEN" ]; then
      log_json "auth_failed"
      exit 1
    fi

    log_json "auth_ok"

    policy_filter="$(urlencode "name=\"$auth_policy_name\"")"
    policy_json="$(api_json GET "/auth-policies?filter=$policy_filter")"
    auth_policy_id="$(printf '%s' "$policy_json" | first_id)"

    if [ -z "$auth_policy_id" ]; then
      log_json "auth_policy_create"
      create_policy_body="$(build_auth_policy_body "")"
      policy_create_json="$(api_json POST "/auth-policies" "$create_policy_body" 201)"
      auth_policy_id="$(printf '%s' "$policy_create_json" | jq -r '.data.id // ""')"
    else
      log_json "auth_policy_present"
    fi

    signer_filter="$(urlencode "name=\"$signer_name\"")"
    signer_json="$(api_json GET "/external-jwt-signers?filter=$signer_filter")"
    signer_id="$(printf '%s' "$signer_json" | first_id)"

    signer_body="$(build_signer_body "$auth_policy_id")"
    if [ -z "$signer_id" ]; then
      log_json "signer_create"
      signer_create_json="$(api_json POST "/external-jwt-signers" "$signer_body" 201)"
      signer_id="$(printf '%s' "$signer_create_json" | jq -r '.data.id // ""')"
    else
      log_json "signer_update"
      api_json PUT "/external-jwt-signers/$signer_id" "$signer_body" >/dev/null
    fi

    policy_body="$(build_auth_policy_body "$signer_id")"
    log_json "auth_policy_update"
    api_json PUT "/auth-policies/$auth_policy_id" "$policy_body" >/dev/null

    log_json "signer_bind_auth_policy"
    signer_body="$(build_signer_body "$auth_policy_id")"
    api_json PUT "/external-jwt-signers/$signer_id" "$signer_body" >/dev/null

    printf '%s\n' "$oidc_users" | while IFS='|' read -r email identity attrs; do
      [ -n "$email" ] || continue
      identity_filter="$(urlencode "name=\"$identity\"")"
      identity_json="$(api_json GET "/identities?filter=$identity_filter")"
      identity_id="$(printf '%s' "$identity_json" | first_id)"
      identity_body="$(build_identity_body "$email" "$identity" "$attrs")"

      if [ -z "$identity_id" ]; then
        log_json "identity_create_${identity}"
        api_json POST "/identities" "$identity_body" 201 >/dev/null
      else
        log_json "identity_update_${identity}"
        api_json PUT "/identities/$identity_id" "$identity_body" >/dev/null
      fi
    done

    client_signer_json="$(curl -sk "$controller/edge/client/v1/external-jwt-signers")"
    client_external_auth_url="$(printf '%s' "$client_signer_json" | jq -r '.data[0].externalAuthUrl // ""')"

    if [ "$client_external_auth_url" != "$external_auth_url" ]; then
      log_json "client_payload_mismatch"
      exit 1
    fi

    log_json "reconcile_ok"
