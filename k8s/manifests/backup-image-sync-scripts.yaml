apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-image-sync-scripts
  namespace: ziti
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  backup-image-sync.sh: |
    #!/bin/sh
    set -eu

    log() {
      printf '{"ts":"%s","component":"backup-image-sync","msg":"%s"}\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$1"
    }

    : "${HARBOR_PASSWORD:?missing HARBOR_PASSWORD}"
    : "${ACR_CLIENT_ID:?missing ACR_CLIENT_ID}"
    : "${ACR_CLIENT_SECRET:?missing ACR_CLIENT_SECRET}"
    : "${ACR_LOGIN_SERVER:?missing ACR_LOGIN_SERVER}"

    apk add --no-cache ca-certificates skopeo >/dev/null

    tag="${ZITI_EDGE_TUNNEL_TAG:-1.9.10}"
    src="docker://harbor.focuscell.org/openziti/ziti-edge-tunnel:${tag}"
    dest="docker://${ACR_LOGIN_SERVER}/backup/ziti-edge-tunnel:${tag}"

    log "sync_start ${src} -> ${dest}"
    skopeo copy \
      --src-creds "robot\$k8s-pull:${HARBOR_PASSWORD}" \
      --src-tls-verify=false \
      --dest-creds "${ACR_CLIENT_ID}:${ACR_CLIENT_SECRET}" \
      "$src" \
      "$dest"
    log "sync_done ${dest}"
