# CoreDNS hosts reference — DO NOT kubectl apply this file directly.
# Use scripts/patch_coredns.sh which discovers the Envoy Gateway ClusterIP
# dynamically and merges entries into the existing Corefile safely.
#
# These entries are needed for in-cluster services that resolve each other
# by external hostname (OIDC validation, webhooks, repo access).
#
# Entries (all point to Envoy Gateway ClusterIP, discovered at runtime):
#
#   <GATEWAY_CLUSTERIP> auth.focuspass.com         # Keycloak OIDC
#   <GATEWAY_CLUSTERIP> git.developerdojo.org      # GitLab
#   <GATEWAY_CLUSTERIP> argocd.focuscell.org       # ArgoCD
#   <GATEWAY_CLUSTERIP> dev.slidee.net             # Slidee
#   <GATEWAY_CLUSTERIP> chat.focusbuzz.org         # Mattermost
#
# Why these entries:
#   - Coder, Slidee, ArgoCD validate tokens against auth.focuspass.com
#   - ArgoCD pulls repos from git.developerdojo.org
#   - GitLab sends webhooks to argocd.focuscell.org
#   - OpenClaw agents connect to Mattermost via chat.focusbuzz.org (no public DNS)
#
# Other services (Harbor, Longhorn, SeaweedFS, etc.) do not need entries because
# no in-cluster pod resolves them by external hostname.
