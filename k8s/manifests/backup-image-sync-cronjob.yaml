apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-image-sync
  namespace: ziti
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  schedule: "17 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: backup-image-sync
        spec:
          serviceAccountName: openziti-sa
          automountServiceAccountToken: false
          restartPolicy: Never
          imagePullSecrets:
            - name: harbor-pull-secret
          containers:
            - name: sync
              image: harbor.focuscell.org/dockerhub-proxy/alpine:3.21
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/backup-image-sync.sh
              env:
                - name: ZITI_EDGE_TUNNEL_TAG
                  value: "1.9.10"
              envFrom:
                - secretRef:
                    name: backup-image-sync-credentials
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: backup-image-sync-scripts
                defaultMode: 0555
