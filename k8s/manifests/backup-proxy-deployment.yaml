# Backup proxy: routes Longhorn Azure Blob backup traffic through the Ziti
# E2EE overlay to the Azure ACI tunneler. No public internet egress needed.
#
# Uses `ziti tunnel proxy` mode — creates a TCP listener on port 8443 that
# proxies connections through the Ziti overlay. No TUN/NET_ADMIN required.
#
# Image prerequisite: mirror the ziti CLI image to Harbor. The controller
# image already contains the `ziti` binary — reuse it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-proxy
  namespace: ziti
  labels:
    app: backup-proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: backup-proxy
  template:
    metadata:
      labels:
        app: backup-proxy
    spec:
      nodeSelector:
        om-labs.io/storage-node: "true"
      imagePullSecrets:
        - name: harbor-pull-secret
      containers:
        - name: proxy
          # Reuse the controller image which has the full `ziti` CLI.
          image: harbor.focuscell.org/infra/ziti-controller:2.0.0-pre2-patched
          command:
            - ziti
          args:
            - tunnel
            - proxy
            - azure-blob-backup:8443
            - -i
            - /ziti/identities/backup-proxy.json
            - -v
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
            runAsUser: 2171
            runAsGroup: 2171
            runAsNonRoot: true
          ports:
            - containerPort: 8443
              name: proxy
              protocol: TCP
          volumeMounts:
            - name: identity
              mountPath: /ziti/identities
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            tcpSocket:
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: identity
          secret:
            secretName: backup-proxy-identity
