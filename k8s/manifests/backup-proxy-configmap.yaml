# HAProxy configuration for the backup proxy TCP bridge.
# Listens on :8443, forwards to focusapiarybackups.blob.core.windows.net:443
# via the ziti-edge-tunnel's DNS resolver (which returns a virtual IP routed
# through the Ziti overlay to the Azure ACI tunneler).
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-proxy-haproxy
  namespace: ziti
data:
  haproxy.cfg: |
    global
        log stdout format raw local0 info

    defaults
        mode tcp
        timeout connect 30s
        timeout client 5m
        timeout server 5m
        retries 3

    resolvers tunnel_dns
        nameserver tunnel 100.64.0.2:53
        resolve_retries 30
        timeout resolve 5s
        timeout retry 2s
        hold valid 30s

    frontend backup_in
        bind *:8443
        default_backend azure_blob

    backend azure_blob
        server blob focusapiarybackups.blob.core.windows.net:443 resolvers tunnel_dns init-addr none
