apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backup-image-sync-credentials
  namespace: ziti
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: backup-image-sync-credentials
    creationPolicy: Owner
  data:
    - secretKey: HARBOR_PASSWORD
      remoteRef:
        key: harbor-robot-k8s-pull-secret
    - secretKey: ACR_CLIENT_ID
      remoteRef:
        key: backup-registry-client-id
    - secretKey: ACR_CLIENT_SECRET
      remoteRef:
        key: backup-registry-client-secret
    - secretKey: ACR_LOGIN_SERVER
      remoteRef:
        key: backup-registry-login-server
