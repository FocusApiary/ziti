# Node inventory — single source of truth for all deployment scripts.
# Format: name:ip:role:site:installer
#
# Fields:
#   name      — Talos node name (must match kubernetes node name)
#   ip        — LAN IP address
#   role      — controlplane | worker
#   site      — Datacenter / location identifier
#   installer — Image variant: t460 → installer-openziti, gpu → installer-gpu-openziti
#
# Lines starting with # and blank lines are ignored.
# Both ziti/scripts/configure_services.sh and rollout-openziti.sh parse this file.

